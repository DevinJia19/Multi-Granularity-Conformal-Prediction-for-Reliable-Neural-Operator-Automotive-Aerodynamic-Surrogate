# Transolver transfer + residual scale head for normalized CP.
run_id: debug/transolver_transfer_sigma
output_dir: runs
checkpoint_dir: null
precision: float32
compile: false
profile: false
head_type: gp
gp_warmup_start: 50
gp_warmup_end: 60
lambda_gp: 0.01
lambda_consistency: 1.0
consistency_every_n_steps: 1
consistency_detach_transolver: false
spectral_norm_embedding: true
normalize_embeddings: true
embedding_target_scale: 1.0
embedding_pooling: attention
n_inducing: 128
embed_dim: 32
embedding_feat_dim: 256
gp_lengthscale_range:
- 0.01
- 1.0
gp_lengthscale_prior: null
gp_outputscale_prior: null
gp_mlp_hidden: null
mlp_head_hidden: null
model:
  _target_: transolver_sigma.TransolverWithSigma
  out_dim: 4
  local_dim: 30
  sigma_input: raw_local_mean
  sigma_hidden: 128
  sigma_layers: 3
  init_sigma: 0.2
  min_sigma: 1.0e-06
  max_sigma: null
  functional_dim: 6
  embedding_dim: 30
  backbone:
    _target_: physicsnemo.models.transolver.transolver.Transolver
    out_dim: 4
    functional_dim: 6
    embedding_dim: 30
    n_layers: 20
    n_hidden: 256
    dropout: 0.0
    n_head: 8
    act: gelu
    mlp_ratio: 2
    slice_num: 128
    unified_pos: false
    structured_shape: null
    use_te: false
    plus: false
training:
  num_epochs: 400
  save_interval: 25
  skip_validation: false
  validate_every: 1
  early_stopping_patience: 0
  gradient_accumulation_steps: 1
  lambda_reg: 0.0
  simple_adamw_only: true
  debug_one_step_loss: false
  debug_forward_io_stats: false
  use_legacy_transolver_forward: true
  scheduler:
    name: StepLR
    params:
      step_size: 50
      gamma: 0.5
  optimizer:
    _target_: torch.optim.AdamW
    lr: 0.0003
    weight_decay: 0.0
    betas:
    - 0.9
    - 0.999
    eps: 1.0e-08
  use_sigma_loss: true
  sigma_loss_weight: 0.05
  sigma_smooth_weight: 0.01
  sigma_smooth_k: 8
  sigma_smooth_max_points: 2048
  sigma_eps: 1.0e-06
  sigma_target_floor: 0.0001
data:
  mode: surface
  normalization_dir: .
  resolution: 8192
  use_fourier_surface_embeddings: true
  normalize_global_features: true
  concat_embedding_to_fx: false
  legacy_fx_embeddings_only: false
  include_geometry: true
  geometry_sampling: 10000
  center_geometry_with_stl_com: true
  overfit_n_samples: null
  overfit_deterministic_subsample: false
  overfit_fresh_start: true
  overfit_use_train_for_val: false
  overfit_fixed_train_batch: false
  preload_depth: 0
  pin_memory: true
  return_mesh_features: false
  volume_sample_from_disk: true
  data_keys:
  - surface_mesh_centers
  - surface_normals
  - surface_fields
  - surface_areas
  - stl_centers
  - stl_areas
  - stl_coordinates
  - stl_faces
  - global_params_reference
  - global_params_values
  train:
    data_path: data_splits/train
  calib:
    data_path: data_splits/calib
  val:
    data_path: data_splits/val
  test:
    data_path: data_splits/test
inference:
  phase: val
cp_output:
  save_pointwise_npz: false
  subdir: null
  note: inference_on_zarr.py saves physical pred/target/sigma (N,4) plus mesh features.
    Datapipe only supports phase train|val. Use inference.phase=val and override
    data.val.data_path (e.g. calib/test). Set cp_output.subdir for output naming.
